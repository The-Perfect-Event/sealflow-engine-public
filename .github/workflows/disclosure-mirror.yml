name: AGPL disclosure mirror

# Tag-driven push to the public AGPL §13 disclosure mirror
# (sealflow#13 Phase 1f).
#
# On every release tag, the tag tree of this private repo is pushed to
# https://github.com/The-Perfect-Event/sealflow-engine-public so anyone
# interacting with the running service over the network can obtain the
# corresponding source. See AGPL_DISCLOSURE.md at repo root for context.
#
# AUTH: deploy-key flow (no PAT, no user identity).
#   - Public key registered on sealflow-engine-public as a write-enabled deploy key
#   - Private key stored on this repo as the MIRROR_SSH_KEY secret
#   - Workflow loads it into ssh-agent, then pushes via git@github.com:...
#
# Rotation: regenerate keypair locally, update both the deploy key and the
# secret in one go. The script that did the initial provisioning is at
# the bottom of sealflow#13's Phase 1f close-out.

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      force:
        description: 'Force-push (use with care; mirror should never diverge)'
        type: boolean
        required: true
        default: false

permissions:
  contents: read

env:
  MIRROR_REPO_SSH: git@github.com:The-Perfect-Event/sealflow-engine-public.git
  MIRROR_REPO_DISPLAY: The-Perfect-Event/sealflow-engine-public

jobs:
  mirror:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout sealflow-engine (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Verify MIRROR_SSH_KEY is configured
        run: |
          if [ -z "${{ secrets.MIRROR_SSH_KEY }}" ]; then
            echo "::error::MIRROR_SSH_KEY secret is not configured."
            exit 1
          fi

      - name: Load deploy key into ssh-agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.MIRROR_SSH_KEY }}

      - name: Add public mirror as a git remote
        run: |
          git remote add public "${{ env.MIRROR_REPO_SSH }}"
          git remote -v

      - name: Push main + tag to mirror
        run: |
          set -eu
          FORCE_FLAG=""
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            FORCE_FLAG="--force-with-lease"
            echo "::warning::Force-push enabled"
          fi
          if [ "${{ github.event_name }}" = "push" ]; then
            git push $FORCE_FLAG public main
            git push $FORCE_FLAG public "${GITHUB_REF_NAME}"
          else
            git push $FORCE_FLAG public main
          fi

      - name: Summary
        run: |
          {
            echo "## Disclosure mirror updated"
            echo ""
            echo "- Mirror: \`${{ env.MIRROR_REPO_DISPLAY }}\`"
            echo "- Pushed: \`main\`$([ "${{ github.event_name }}" = "push" ] && echo " + tag \`${GITHUB_REF_NAME}\`")"
            echo ""
            echo "AGPL §13 disclosure surface refreshed."
          } >> "$GITHUB_STEP_SUMMARY"
